<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cisterna Monitor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #f0ede6;
  --surface:  #e8e4db;
  --border:   #ccc8be;
  --text:     #1a1916;
  --muted:    #8a8780;
  --critico:  #c0392b;
  --baixo:    #e67e22;
  --normal:   #2980b9;
  --alto:     #27ae60;
  --cheio:    #1abc9c;
  --water:    #2980b9;
  --wave1:    rgba(41,128,185,0.6);
  --wave2:    rgba(52,152,219,0.4);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 2rem 1rem;
}

.page {
  width: 100%;
  max-width: 780px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  align-items: start;
}

/* ── cabeçalho ── */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  border-bottom: 1.5px solid var(--border);
  padding-bottom: 1rem;
}

.header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem;
  letter-spacing: .06em;
  line-height: 1;
}

.endpoint-badge {
  font-family: 'DM Mono', monospace;
  font-size: .7rem;
  background: var(--text);
  color: var(--bg);
  padding: .3rem .7rem;
  border-radius: 4px;
  letter-spacing: .04em;
}

/* ── tanque ── */
.tank-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
}

.tank-outer {
  position: relative;
  width: 200px;
  height: 320px;
}

/* estrutura metálica do tanque */
.tank-body {
  position: absolute;
  inset: 0;
  border: 3px solid #8a8780;
  border-radius: 6px 6px 14px 14px;
  overflow: hidden;
  background: #ddd9d0;
}

/* água */
.water-fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 0%;
  transition: height 1.2s cubic-bezier(0.4, 0, 0.2, 1),
              background 1s ease;
  background: var(--water);
  overflow: hidden;
}

/* ondas SVG */
.waves {
  position: absolute;
  top: -18px; left: 0;
  width: 200%; height: 20px;
  animation: waveMove 3s linear infinite;
}
.waves2 {
  position: absolute;
  top: -12px; left: 0;
  width: 200%; height: 14px;
  animation: waveMove 2s linear infinite reverse;
  opacity: .5;
}

@keyframes waveMove {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* bolhas */
.bubbles {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.bubble {
  position: absolute;
  bottom: 10px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  animation: rise var(--dur, 3s) ease-in infinite var(--delay, 0s);
}
@keyframes rise {
  0%   { transform: translateX(0) translateY(0); opacity: .7; }
  50%  { transform: translateX(6px) translateY(-40%); }
  100% { transform: translateX(-4px) translateY(-95%); opacity: 0; }
}

/* reflexo */
.tank-body::after {
  content: '';
  position: absolute;
  top: 0; left: 10px;
  width: 18px; bottom: 0;
  background: linear-gradient(90deg, rgba(255,255,255,.12), transparent);
  pointer-events: none;
  border-radius: 0 0 0 14px;
}

/* régua de escala */
.scale {
  position: absolute;
  top: 8px; right: -36px; bottom: 8px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.scale-mark {
  display: flex;
  align-items: center;
  gap: 4px;
}
.scale-mark span {
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  color: var(--muted);
  line-height: 1;
}
.scale-mark::before {
  content: '';
  display: block;
  width: 6px; height: 1px;
  background: var(--border);
}

/* tampa e canos */
.tank-top {
  position: absolute;
  top: -10px; left: 50%;
  transform: translateX(-50%);
  width: 40px; height: 10px;
  background: #8a8780;
  border-radius: 3px 3px 0 0;
}
.tank-pipe-in {
  position: absolute;
  top: -26px; left: 30px;
  width: 8px; height: 20px;
  background: #8a8780;
  border-radius: 3px 3px 0 0;
}
.tank-pipe-out {
  position: absolute;
  bottom: -12px; left: 50%;
  transform: translateX(-50%);
  width: 10px; height: 14px;
  background: #8a8780;
  border-radius: 0 0 3px 3px;
}

/* percentual central no tanque */
.tank-pct {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.6rem;
  letter-spacing: .04em;
  color: rgba(255,255,255,0.9);
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  pointer-events: none;
  transition: opacity .3s;
  z-index: 2;
}
.tank-pct.hidden { opacity: 0; }

/* badge status */
.status-badge {
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: .35rem 1rem;
  border-radius: 99px;
  border: 1.5px solid currentColor;
  transition: color .5s, border-color .5s, background .5s;
}

/* ── painel de controle ── */
.control-panel {
  display: flex;
  flex-direction: column;
  gap: 1.4rem;
}

.panel-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: .08em;
  border-bottom: 1px solid var(--border);
  padding-bottom: .5rem;
}

.field-group {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}

label {
  font-size: .78rem;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
}

input[type=number] {
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: .6rem .9rem;
  color: var(--text);
  width: 100%;
  transition: border-color .2s;
  outline: none;
}
input[type=number]:focus { border-color: var(--text); }

input[type=range] {
  width: 100%;
  accent-color: var(--text);
  cursor: pointer;
  height: 4px;
}

.btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: .1em;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  padding: .75rem 1.5rem;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  width: 100%;
}
.btn:hover  { opacity: .85; }
.btn:active { transform: scale(.98); }

/* info card */
.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: .7rem;
}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: .82rem;
}
.info-row .lbl { color: var(--muted); font-family: 'DM Mono', monospace; font-size: .72rem; }
.info-row .val { font-weight: 500; font-family: 'DM Mono', monospace; }

/* histórico */
.history-wrap {
  grid-column: 1 / -1;
  border-top: 1px solid var(--border);
  padding-top: 1rem;
}

.history-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: .08em;
  margin-bottom: .7rem;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: .35rem;
  max-height: 150px;
  overflow-y: auto;
}

.hist-entry {
  display: flex;
  gap: 1rem;
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  align-items: center;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; } }

.hist-entry .ht  { color: var(--muted); min-width: 56px; }
.hist-entry .hv  { font-weight: 500; }
.hist-entry .hs  { font-size: .68rem; padding: .1rem .5rem; border-radius: 99px; border: 1px solid currentColor; }

/* barra de progresso horizontal */
.hbar-wrap { flex: 1; background: var(--border); border-radius: 99px; height: 4px; overflow: hidden; }
.hbar      { height: 100%; border-radius: 99px; transition: width .4s; background: var(--water); }

/* status colors */
.s-critico { color: var(--critico); }
.s-baixo   { color: var(--baixo); }
.s-normal  { color: var(--normal); }
.s-alto    { color: var(--alto); }
.s-cheio   { color: var(--cheio); }
</style>
</head>
<body>
<div class="page">

  <!-- cabeçalho -->
  <header class="header">
    <h1>Cisterna Monitor</h1>
    <code class="endpoint">GET /nivel?v={0-100}</code>
  </header>

  <!-- tanque animado -->
  <section class="tank-section">
    <div class="tank-outer">
      <!-- encanamento -->
      <div class="tank-pipe-in"></div>
      <div class="tank-top"></div>

      <div class="tank-body">
        <div class="water-fill" id="waterFill">
          <!-- ondas -->
          <svg class="waves" viewBox="0 0 200 20" preserveAspectRatio="none"
               xmlns="http://www.w3.org/2000/svg">
            <path d="M0 10 Q25 0 50 10 Q75 20 100 10 Q125 0 150 10 Q175 20 200 10 L200 20 L0 20 Z"
                  fill="rgba(255,255,255,0.25)"/>
          </svg>
          <svg class="waves2" viewBox="0 0 200 14" preserveAspectRatio="none"
               xmlns="http://www.w3.org/2000/svg">
            <path d="M0 7 Q30 0 60 7 Q90 14 120 7 Q150 0 180 7 Q190 10 200 7 L200 14 L0 14 Z"
                  fill="rgba(255,255,255,0.15)"/>
          </svg>
          <!-- bolhas -->
          <div class="bubbles">
            <div class="bubble" style="left:20%; --dur:3.2s; --delay:0s;"></div>
            <div class="bubble" style="left:45%; --dur:2.5s; --delay:1s; width:4px; height:4px;"></div>
            <div class="bubble" style="left:70%; --dur:4s;   --delay:0.5s;"></div>
            <div class="bubble" style="left:60%; --dur:2.8s; --delay:2s; width:5px; height:5px;"></div>
            <div class="bubble" style="left:35%; --dur:3.6s; --delay:1.5s; width:4px; height:4px;"></div>
          </div>
        </div>
        <div class="tank-pct hidden" id="tankPct">0%</div>
      </div>

      <div class="tank-pipe-out"></div>

      <!-- régua -->
      <div class="scale">
        <div class="scale-mark"><span>100</span></div>
        <div class="scale-mark"><span>75</span></div>
        <div class="scale-mark"><span>50</span></div>
        <div class="scale-mark"><span>25</span></div>
        <div class="scale-mark"><span>0</span></div>
      </div>
    </div>

    <div class="status-badge s-normal" id="statusBadge">normal</div>
  </section>

  <!-- painel de controle -->
  <section class="control-panel">
    <p class="panel-title">Monitor Automático</p>

    <div class="field-group">
      <label>Modo</label>
      <div style="display:flex; gap:.6rem;">
        <button class="btn btn-mode active" id="btnAuto" onclick="setModo('auto')">⟳ Automático</button>
        <button class="btn btn-mode" id="btnManual" onclick="setModo('manual')" style="background:var(--surface); color:var(--text); border:1.5px solid var(--border);">Manual</button>
      </div>
    </div>

    <div id="painelAuto">
      <div class="field-group">
        <label>Próxima atualização</label>
        <div style="display:flex; align-items:center; gap:.8rem;">
          <div style="flex:1; background:var(--border); border-radius:99px; height:6px; overflow:hidden;">
            <div id="timerBar" style="height:100%; width:100%; background:var(--text); border-radius:99px; transition:width .1s linear;"></div>
          </div>
          <span id="timerCount" style="font-family:'DM Mono',monospace; font-size:.85rem; min-width:24px;">5s</span>
        </div>
      </div>
      <button class="btn" onclick="atualizarAgora()">▶ Atualizar agora</button>
    </div>

    <div id="painelManual" style="display:none; flex-direction:column; gap:.8rem;">
      <div class="field-group">
        <label>Valor (0.0 – 100.0%)</label>
        <input type="number" id="nivelInput" min="0" max="100" step="0.1" value="50" placeholder="ex: 75.5"/>
      </div>
      <div class="field-group">
        <label>Ajuste rápido</label>
        <input type="range" id="nivelSlider" min="0" max="100" step="0.5" value="50"/>
      </div>
      <button class="btn" onclick="enviarManual()">▶ Definir nível</button>
    </div>

    <div class="info-card">
      <div class="info-row">
        <span class="lbl">Nível atual</span>
        <span class="val" id="infoNivel">50.0%</span>
      </div>
      <div class="info-row">
        <span class="lbl">Status</span>
        <span class="val" id="infoStatus">normal</span>
      </div>
      <div class="info-row">
        <span class="lbl">Última atualização</span>
        <span class="val" id="infoUrl">—</span>
      </div>
      <div class="info-row">
        <span class="lbl">Total de leituras</span>
        <span class="val" id="infoResp">0</span>
      </div>
    </div>
  </section>

  <!-- histórico -->
  <div class="history-wrap">
    <p class="history-title">Histórico</p>
    <div class="history-list" id="histList">
      <p style="font-size:.78rem; color:var(--muted); font-family:'DM Mono',monospace;">
        Nenhuma atualização ainda.
      </p>
    </div>
  </div>

</div>

<script>
const COLORS = {
  critico: 'var(--critico)',
  baixo:   'var(--baixo)',
  normal:  'var(--normal)',
  alto:    'var(--alto)',
  cheio:   'var(--cheio)',
};

const INTERVALO = 5000; /* 5 segundos */
let totalLeituras = 0;
let primeiroHist  = true;
let modoAtual     = 'auto';
let timerInterval = null;
let countDown     = INTERVALO;

/* ── helpers ── */
function getStatus(nivel) {
  if (nivel <= 10)  return 'critico';
  if (nivel <= 30)  return 'baixo';
  if (nivel <= 70)  return 'normal';
  if (nivel <= 90)  return 'alto';
  return 'cheio';
}

function nivelAleatorio() {
  return Math.round(Math.random() * 1000) / 10; /* 0.0 – 100.0 */
}

function agora() {
  return new Date().toLocaleTimeString('pt-BR',
    { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

/* ── atualiza visual do tanque ── */
function atualizarTanque(nivel, status) {
  const waterFill   = document.getElementById('waterFill');
  const tankPct     = document.getElementById('tankPct');
  const statusBadge = document.getElementById('statusBadge');

  waterFill.style.height     = nivel + '%';
  waterFill.style.background = COLORS[status];

  tankPct.textContent = nivel.toFixed(1) + '%';
  tankPct.classList.toggle('hidden', nivel < 15);

  statusBadge.textContent = status;
  statusBadge.className   = 'status-badge s-' + status;

  totalLeituras++;
  document.getElementById('infoNivel').textContent  = nivel.toFixed(1) + '%';
  document.getElementById('infoStatus').textContent = status;
  document.getElementById('infoStatus').className   = 'val s-' + status;
  document.getElementById('infoUrl').textContent    = agora();
  document.getElementById('infoResp').textContent   = totalLeituras;
}

/* ── histórico ── */
function adicionarHistorico(nivel, status) {
  const list = document.getElementById('histList');
  if (primeiroHist) { list.innerHTML = ''; primeiroHist = false; }

  const entry = document.createElement('div');
  entry.className = 'hist-entry';
  entry.innerHTML =
    `<span class="ht">${agora()}</span>` +
    `<span class="hbar-wrap"><span class="hbar" style="width:${nivel.toFixed(1)}%; background:${COLORS[status]}"></span></span>` +
    `<span class="hv">${nivel.toFixed(1)}%</span>` +
    `<span class="hs s-${status}">${status}</span>`;

  list.insertBefore(entry, list.firstChild);
  while (list.children.length > 20) list.removeChild(list.lastChild);
}

/* ── leitura automática ── */
function lerNivel() {
  const nivel  = nivelAleatorio();
  const status = getStatus(nivel);
  atualizarTanque(nivel, status);
  adicionarHistorico(nivel, status);
}

function atualizarAgora() {
  lerNivel();
  resetarTimer();
}

/* ── barra de progresso do timer ── */
function resetarTimer() {
  countDown = INTERVALO;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    countDown -= 100;
    const pct = (countDown / INTERVALO) * 100;
    document.getElementById('timerBar').style.width  = Math.max(0, pct) + '%';
    document.getElementById('timerCount').textContent = Math.ceil(countDown / 1000) + 's';
    if (countDown <= 0) {
      lerNivel();
      countDown = INTERVALO;
    }
  }, 100);
}

/* ── modo auto / manual ── */
function setModo(modo) {
  modoAtual = modo;

  document.getElementById('painelAuto').style.display   = modo === 'auto'   ? 'flex'  : 'none';
  document.getElementById('painelManual').style.display = modo === 'manual' ? 'flex'  : 'none';
  document.getElementById('painelAuto').style.flexDirection = 'column';
  document.getElementById('painelAuto').style.gap = '.8rem';

  const btnAuto   = document.getElementById('btnAuto');
  const btnManual = document.getElementById('btnManual');

  if (modo === 'auto') {
    btnAuto.style.background = 'var(--text)';
    btnAuto.style.color      = 'var(--bg)';
    btnAuto.style.border     = 'none';
    btnManual.style.background = 'var(--surface)';
    btnManual.style.color      = 'var(--text)';
    btnManual.style.border     = '1.5px solid var(--border)';
    resetarTimer();
  } else {
    btnManual.style.background = 'var(--text)';
    btnManual.style.color      = 'var(--bg)';
    btnManual.style.border     = 'none';
    btnAuto.style.background   = 'var(--surface)';
    btnAuto.style.color        = 'var(--text)';
    btnAuto.style.border       = '1.5px solid var(--border)';
    clearInterval(timerInterval);

    /* sincroniza input ↔ slider no modo manual */
    const ni = document.getElementById('nivelInput');
    const ns = document.getElementById('nivelSlider');
    if (ni && ns) {
      ni.addEventListener('input', () => {
        let v = parseFloat(ni.value);
        if (!isNaN(v)) ns.value = Math.min(100, Math.max(0, v));
      });
      ns.addEventListener('input', () => {
        ni.value = parseFloat(ns.value).toFixed(1);
      });
    }
  }
}

/* ── envio manual ── */
function enviarManual() {
  const ni = document.getElementById('nivelInput');
  let nivel = parseFloat(ni.value);
  if (isNaN(nivel)) nivel = 0;
  nivel = Math.min(100, Math.max(0, nivel));
  const status = getStatus(nivel);
  atualizarTanque(nivel, status);
  adicionarHistorico(nivel, status);
}

/* ── início ── */
atualizarTanque(50, 'normal');
setModo('auto');
lerNivel();
</script>
</body>
</html>
